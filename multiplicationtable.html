<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Multiplication Theme Park</title>
  <style>
    /* Dynamic Theme Styles */
    :root {
      --bg-image: url('multiplicationtable-image1.png');
      --card-bg: rgba(255, 255, 255, 0.94);
      --primary: #38bdf8;
      --success: #10b981;
      --danger: #ef4444;
      --text: #0f172a;
      --accent-glow: rgba(56, 189, 248, 0.4);
    }

    body[data-theme="robot"] {
      --bg-image: url('multiplicationtable-image1.png');
      --primary: #0284c7;
      --accent-glow: rgba(56, 189, 248, 0.4);
    }
    body[data-theme="flower"] {
      --bg-image: url('multiplicationtable-image2.png');
      --primary: #db2777;
      --accent-glow: rgba(236, 72, 153, 0.4);
    }
    body[data-theme="aquatic"] {
      --bg-image: url('multiplicationtable-image3.png');
      --primary: #0891b2;
      --accent-glow: rgba(6, 182, 212, 0.4);
    }
    body[data-theme="volcano"] {
      --bg-image: url('multiplicationtable-image4.png');
      --primary: #ea580c;
      --accent-glow: rgba(249, 115, 22, 0.4);
    }
    body[data-theme="space"] {
      --bg-image: url('multiplicationtable-image5.png');
      --primary: #7c3aed;
      --accent-glow: rgba(139, 92, 246, 0.4);
    }
    body[data-theme="unicorn"] {
      --bg-image: url('multiplicationtable-image6.png');
      --primary: #9333ea;
      --accent-glow: rgba(192, 132, 252, 0.4);
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header Bar */
    header {
      height: 65px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 2px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
      flex-shrink: 0;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    label {
      font-size: 1.1rem;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    select {
      font-size: 1rem;
      padding: 6px 12px;
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.95);
      color: var(--text);
      font-weight: bold;
      outline: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .toggle-container {
      display: flex;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 30px;
      padding: 4px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .toggle-btn {
      padding: 6px 18px;
      border-radius: 25px;
      font-weight: 800;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.85);
      transition: all 0.25s ease;
    }

    .toggle-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    /* Main Area Layout */
    main {
      flex: 1;
      display: flex;
      padding: 15px;
      gap: 15px;
      position: relative;
      min-height: 0; /* Prevents overflow in flex container */
    }

    /* Flashcard Container */
    .card-container {
      flex: 1;
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 5px solid rgba(255, 255, 255, 0.9);
      overflow: hidden;
      transition: background-image 0.4s ease-in-out;
      padding: 15px;
    }

    /* Semi-transparent backdrop overlay */
    .equation-wrapper {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 2vw 3vw;
      border-radius: 28px;
      border: 3px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 95%;
    }

    /* Responsive equation layout */
    .equation {
      font-size: clamp(4rem, 9vw, 8.5rem);
      font-weight: 900;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 12px;
      filter: drop-shadow(0px 3px 6px rgba(0, 0, 0, 0.25));
    }

    .equation span {
      /* Replaced -webkit-text-stroke with high-contrast text shadows */
      text-shadow: 0 0 4px #ffffff, 0 2px 8px rgba(255, 255, 255, 0.8);
    }

    .answer-box {
      min-width: clamp(110px, 14vw, 180px);
      height: clamp(80px, 11vw, 130px);
      border-radius: 22px;
      border: 5px dashed var(--primary);
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(3.8rem, 8vw, 7.5rem);
      font-weight: 900;
      color: var(--primary);
      position: relative;
      padding: 0 10px;
      transition: all 0.2s ease;
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.1);
    }

    .answer-box.correct {
      border: 5px solid var(--success);
      background: rgba(16, 185, 129, 0.25);
      color: var(--success);
      animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .answer-box.wrong {
      border: 5px solid var(--danger);
      background: rgba(239, 68, 68, 0.25);
      color: var(--danger);
      animation: shake 0.4s ease;
    }

    .answer-feedback-icon {
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      margin-left: 6px;
    }

    .next-card-btn {
      margin-top: 20px;
      padding: 14px 45px;
      font-size: clamp(1.3rem, 2vw, 1.8rem);
      font-weight: 800;
      background: var(--primary);
      color: white;
      border: 3px solid #ffffff;
      border-radius: 18px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: transform 0.1s;
      z-index: 2;
    }

    .next-card-btn:active {
      transform: scale(0.96);
    }

    /* Right Column Panel */
    .right-panel {
      width: clamp(260px, 28vw, 340px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }

    .seesaw-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .seesaw-scores {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 1.5rem;
      font-weight: 900;
      padding: 0 10px 5px 10px;
      position: relative;
      z-index: 10;
    }

    .score-tag-correct { color: var(--success); }
    .score-tag-wrong { color: var(--danger); }

    .seesaw-wrapper {
      width: 100%;
      height: 120px;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .seesaw-fulcrum {
      position: absolute;
      bottom: 0;
      width: 0;
      height: 0;
      border-left: 24px solid transparent;
      border-right: 24px solid transparent;
      border-bottom: 48px solid #1e293b;
      z-index: 1;
    }

    .seesaw-plank {
      width: 92%;
      height: 14px;
      background: #475569;
      border-radius: 7px;
      position: absolute;
      bottom: 46px;
      transform-origin: center center;
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 8px;
      z-index: 2;
    }

    .stack {
      display: flex;
      flex-direction: column-reverse;
      gap: 2px;
      position: absolute;
      bottom: 14px;
    }

    .stack-left { left: 8px; }
    .stack-right { right: 8px; }

    .block {
      width: 28px;
      height: 7px;
      border-radius: 3px;
      animation: dropIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .block-green { background: var(--success); box-shadow: 0 0 4px var(--success); }
    .block-red { background: var(--danger); box-shadow: 0 0 4px var(--danger); }

    /* Keypad Grid */
    .numpad-container {
      flex: 1;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 8px;
    }

    .num-btn {
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      font-weight: 800;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 3px 0 #cbd5e1;
      transition: all 0.05s ease;
    }

    .num-btn:active {
      transform: translateY(3px);
      box-shadow: none;
    }

    .num-btn.clear {
      background: #fef2f2;
      color: var(--danger);
      border-color: #fca5a5;
      box-shadow: 0 3px 0 #fca5a5;
    }

    .num-btn.submit {
      background: #ecfdf5;
      color: var(--success);
      border-color: #6ee7b7;
      box-shadow: 0 3px 0 #6ee7b7;
    }

    /* Modal Screens */
    .game-over-modal {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .modal-content h2 { font-size: 2.5rem; margin: 0 0 10px 0; color: var(--text); }
    .modal-content p { font-size: 1.2rem; color: #64748b; margin-bottom: 20px; }

    .restart-btn {
      padding: 14px 35px;
      font-size: 1.3rem;
      font-weight: 800;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 6px 16px var(--accent-glow);
    }

    .hidden { display: none !important; }

    @keyframes pop {
      0% { transform: scale(0.8); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-10px); }
      40%, 80% { transform: translateX(10px); }
    }

    @keyframes dropIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body data-theme="robot">

  <header>
    <div class="control-group">
      <label for="table-select">Table:</label>
      <select id="table-select">
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6" selected>6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
      </select>
    </div>

    <div class="control-group">
      <label for="theme-select">Theme:</label>
      <select id="theme-select">
        <option value="robot">🤖 Robot</option>
        <option value="flower">🌸 Flower</option>
        <option value="aquatic">🌊 Aquatic</option>
        <option value="volcano">🌋 Volcano</option>
        <option value="space">🚀 Space</option>
        <option value="unicorn">🦄 Unicorn</option>
      </select>
    </div>

    <div class="toggle-container" id="mode-toggle">
      <div class="toggle-btn active" id="learn-btn">Learn</div>
      <div class="toggle-btn" id="test-btn">Test</div>
    </div>
  </header>

  <main>
    <div class="card-container">
      <div class="equation-wrapper">
        <div class="equation">
          <span id="num-a">6</span>
          <span>×</span>
          <span id="num-b">2</span>
          <span>=</span>
          <div id="answer-box" class="answer-box">
            <span id="user-answer">?</span>
            <span id="feedback-icon" class="answer-feedback-icon"></span>
          </div>
        </div>
      </div>

      <button id="next-btn" class="next-card-btn">Next Card</button>

      <div id="game-over" class="game-over-modal hidden">
        <div class="modal-content">
          <h2 id="game-over-title">Completed!</h2>
          <p id="game-over-desc"></p>
          <button class="restart-btn" id="restart-btn">Play Again</button>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="seesaw-card" id="seesaw-card">
        <div class="seesaw-scores">
          <span class="score-tag-correct">✓ <span id="correct-score">0</span></span>
          <span class="score-tag-wrong">✗ <span id="wrong-score">0</span></span>
        </div>
        <div class="seesaw-wrapper">
          <div class="seesaw-fulcrum"></div>
          <div class="seesaw-plank" id="seesaw-plank">
            <div class="stack stack-left" id="green-stack"></div>
            <div class="stack stack-right" id="red-stack"></div>
          </div>
        </div>
      </div>

      <div class="numpad-container hidden" id="numpad">
        <div class="num-btn" data-val="1">1</div>
        <div class="num-btn" data-val="2">2</div>
        <div class="num-btn" data-val="3">3</div>
        <div class="num-btn" data-val="4">4</div>
        <div class="num-btn" data-val="5">5</div>
        <div class="num-btn" data-val="6">6</div>
        <div class="num-btn" data-val="7">7</div>
        <div class="num-btn" data-val="8">8</div>
        <div class="num-btn" data-val="9">9</div>
        <div class="num-btn clear" id="btn-clear">C</div>
        <div class="num-btn" data-val="0">0</div>
        <div class="num-btn submit" id="btn-submit">↵</div>
      </div>
    </div>
  </main>

  <script>
    let mode = 'learn';
    let selectedNumber = 6;
    let currentRandom = 2;
    let inputVal = '';
    let correctCount = 0;
    let wrongCount = 0;
    let isProcessing = false;
    let previousMultipliers = [];

    const tableSelect = document.getElementById('table-select');
    const themeSelect = document.getElementById('theme-select');
    const learnBtn = document.getElementById('learn-btn');
    const testBtn = document.getElementById('test-btn');
    const numA = document.getElementById('num-a');
    const numB = document.getElementById('num-b');
    const answerBox = document.getElementById('answer-box');
    const userAnswer = document.getElementById('user-answer');
    const feedbackIcon = document.getElementById('feedback-icon');
    const nextBtn = document.getElementById('next-btn');
    const numpad = document.getElementById('numpad');
    const seesawCard = document.getElementById('seesaw-card');
    const seesawPlank = document.getElementById('seesaw-plank');
    const greenStack = document.getElementById('green-stack');
    const redStack = document.getElementById('red-stack');
    const correctScoreEl = document.getElementById('correct-score');
    const wrongScoreEl = document.getElementById('wrong-score');
    const gameOverModal = document.getElementById('game-over');
    const gameOverTitle = document.getElementById('game-over-title');
    const gameOverDesc = document.getElementById('game-over-desc');
    const restartBtn = document.getElementById('restart-btn');

    function init() {
      selectedNumber = parseInt(tableSelect.value, 10);
      resetScores();
      generateNewQuestion();
      updateUI();
    }

    function resetScores() {
      correctCount = 0;
      wrongCount = 0;
      previousMultipliers = [];
      correctScoreEl.textContent = '0';
      wrongScoreEl.textContent = '0';
      greenStack.innerHTML = '';
      redStack.innerHTML = '';
      seesawPlank.style.transform = 'rotate(0deg)';
      gameOverModal.classList.add('hidden');
    }

    function getRandomMultiplier() {
      const allowed = [2, 3, 4, 5, 6, 7, 8, 9].filter(
        num => !previousMultipliers.includes(num)
      );
      const choice = allowed[Math.floor(Math.random() * allowed.length)];
      previousMultipliers.push(choice);
      if (previousMultipliers.length > 5) previousMultipliers.shift();
      return choice;
    }

    function generateNewQuestion() {
      inputVal = '';
      currentRandom = getRandomMultiplier();
      numA.textContent = selectedNumber;
      numB.textContent = currentRandom;

      answerBox.className = 'answer-box';
      feedbackIcon.textContent = '';

      if (mode === 'learn') {
        userAnswer.textContent = selectedNumber * currentRandom;
      } else {
        userAnswer.textContent = '?';
      }
    }

    function updateUI() {
      if (mode === 'learn') {
        learnBtn.classList.add('active');
        testBtn.classList.remove('active');
        nextBtn.classList.remove('hidden');
        numpad.classList.add('hidden');
        seesawCard.classList.add('hidden');
      } else {
        testBtn.classList.add('active');
        learnBtn.classList.remove('active');
        nextBtn.classList.add('hidden');
        numpad.classList.remove('hidden');
        seesawCard.classList.remove('hidden');
      }
      generateNewQuestion();
    }

    function updateSeesaw() {
      const diff = correctCount - wrongCount;
      const angle = Math.max(-14, Math.min(14, diff * -2));
      seesawPlank.style.transform = `rotate(${angle}deg)`;
    }

    function appendInput(digit) {
      if (inputVal.length < 3) {
        inputVal += digit;
        userAnswer.textContent = inputVal;
      }
    }

    function clearInput() {
      inputVal = '';
      userAnswer.textContent = '?';
    }

    window.addEventListener('keydown', (e) => {
      if (isProcessing) return;

      if (mode === 'learn') {
        if (e.key === 'Enter' || e.key === ' ') {
          generateNewQuestion();
        }
        return;
      }

      if (e.key >= '0' && e.key <= '9') {
        appendInput(e.key);
      } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key.toLowerCase() === 'c') {
        clearInput();
      } else if (e.key === 'Enter') {
        if (inputVal !== '') {
          checkAnswer();
        }
      }
    });

    tableSelect.addEventListener('change', (e) => {
      selectedNumber = parseInt(e.target.value, 10);
      resetScores();
      generateNewQuestion();
    });

    themeSelect.addEventListener('change', (e) => {
      document.body.setAttribute('data-theme', e.target.value);
    });

    learnBtn.addEventListener('click', () => {
      if (mode !== 'learn') {
        mode = 'learn';
        resetScores();
        updateUI();
      }
    });

    testBtn.addEventListener('click', () => {
      if (mode !== 'test') {
        mode = 'test';
        resetScores();
        updateUI();
      }
    });

    nextBtn.addEventListener('click', () => {
      generateNewQuestion();
    });

    numpad.addEventListener('click', (e) => {
      if (isProcessing || mode !== 'test') return;
      const target = e.target;
      if (target.dataset.val) {
        appendInput(target.dataset.val);
      } else if (target.id === 'btn-clear') {
        clearInput();
      } else if (target.id === 'btn-submit') {
        if (inputVal !== '') {
          checkAnswer();
        }
      }
    });

    function checkAnswer() {
      isProcessing = true;
      const expected = selectedNumber * currentRandom;
      const actual = parseInt(inputVal, 10);

      if (actual === expected) {
        correctCount++;
        correctScoreEl.textContent = correctCount;
        
        const block = document.createElement('div');
        block.className = 'block block-green';
        greenStack.appendChild(block);
        updateSeesaw();

        answerBox.classList.add('correct');
        feedbackIcon.textContent = '✓';

        setTimeout(() => {
          isProcessing = false;
          checkGameEnd() || generateNewQuestion();
        }, 500);

      } else {
        wrongCount++;
        wrongScoreEl.textContent = wrongCount;

        const block = document.createElement('div');
        block.className = 'block block-red';
        redStack.appendChild(block);
        updateSeesaw();

        answerBox.classList.add('wrong');
        userAnswer.textContent = expected;
        feedbackIcon.textContent = '✗';

        setTimeout(() => {
          isProcessing = false;
          checkGameEnd() || generateNewQuestion();
        }, 1500);
      }
    }

    function checkGameEnd() {
      if (correctCount >= 10 || wrongCount >= 10) {
        if (correctCount >= 10) {
          gameOverTitle.textContent = "Victory! 🎉";
          gameOverDesc.textContent = `You mastered the ${selectedNumber}× table with 10 correct answers!`;
        } else {
          gameOverTitle.textContent = "Nice Try! 💪";
          gameOverDesc.textContent = `You hit 10 wrong answers. Practice a bit more!`;
        }
        gameOverModal.classList.remove('hidden');
        return true;
      }
      return false;
    }

    restartBtn.addEventListener('click', () => {
      resetScores();
      generateNewQuestion();
    });

    init();
  </script>
</body>
</html>
